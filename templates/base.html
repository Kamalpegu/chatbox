{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ PROJECT_TITLE }}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/htmx.org/dist/htmx.js"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hyperscript.org@0.9.91/dist/_hyperscript.min.js" integrity="sha384-kNli9q2SAIKZyCaj/HsxM+q3rmzWVyOTVcwQ/X1tVf7h38a1wkbfBYpckMRA0eSr" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        [x-cloak] { 
            display: none !important; 
        }
        h1 {
            @apply text-4xl font-black mb-6 tracking-tight text-slate-950
        }
        h2 {
            @apply text-xl font-bold mb-2 tracking-tight
        }
        p {
            @apply mb-4 leading-relaxed
        }
        .button, button, [type='submit'], [type='button'] {
            @apply bg-indigo-600 text-white font-bold px-6 py-4 inline-block 
            rounded-xl shadow-lg shadow-indigo-950/20 transition-all duration-200 cursor-pointer
        }
        .button:hover, button:hover, [type='submit']:hover, [type='button']:hover {
            @apply bg-indigo-700 -translate-y-0.5 shadow-indigo-950/30
        }
        .button:active, button:active, [type='submit']:active, [type='button']:active {
            @apply scale-95 translate-y-0
        }
        .button.alert, button.alert {
            @apply bg-red-700 shadow-red-950/20
        }
        .button.alert:hover, button.alert:hover {
            @apply bg-red-600 shadow-red-950/30
        }
        .button-red {
            @apply !bg-red-500 hover:!bg-red-600 !shadow-red-950/20
        }
        .button-gray {
            @apply !bg-slate-200 text-slate-800 hover:!bg-slate-300 !shadow-none
        }
        .navitems>li>a {
            @apply flex items-center gap-2 h-12 px-4 hover:bg-white/10 rounded-xl transition-colors;
        }
        .hoverlist>* {
            @apply hover:bg-indigo-50 rounded-xl transition duration-150;
        }
        .hoverlist>*>a {
            @apply flex items-center p-3 rounded-xl;
        }
        .highlight {
            @apply !bg-indigo-100;
        }
        .allauth content a {
            @apply underline underline-offset-2
        }
        .allauth content a:hover {
            @apply text-indigo-500
        }
        .allauth form[action="/accounts/signup/"] ul {
            @apply hidden
        }
        .allauth form[action="/accounts/signup/"] ul.errorlist {
            @apply block
        }
        .allauth .helptext {
            @apply block mt-4
        }
        label {
            @apply hidden
        }
        input[type=file] {
            @apply bg-white pl-0
        }
        .textarea, textarea, input {
            @apply w-full rounded-xl py-4 px-5 bg-white/90 text-slate-900 shadow-sm ring-1 ring-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500
        }
        .errorlist li {
            @apply p-1 pl-4 border-l-red-500 border-l-4 border-solid mb-2 text-red-500
        }
        label[for="id_remember"] {
            @apply inline-block w-auto mr-2
        }
        input[name="remember"] {
            @apply w-auto
        }
        .alert-info { @apply bg-blue-300 }
        .alert-success { @apply bg-green-400 }
        .alert-warning { @apply bg-amber-400 }
        .alert-danger { @apply bg-amber-500 }
        .green-dot {
            @apply rounded-full w-3 h-3 bg-green-500 p-1.5
        }
        .gray-dot {
            @apply rounded-full w-3 h-3 bg-gray-500 p-1.5
        }
        .graylight-dot {
            @apply rounded-full w-3 h-3 bg-gray-300 p-1.5
        }

    </style>
</head>
<body class="{% block class %}bg-slate-950{% endblock %}" hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
	
    {% include 'includes/messages.html' %}

    {% include 'includes/header.html' %}

    {% block layout %}
    {% endblock %}
    {% block javascript %}{% endblock %}

</body>
</html>
