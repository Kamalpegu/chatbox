<span id="online-count" hx-swap-oob="outerHTML" class="fade-in-scale pr-1 font-black">
    {{ online_count }}
    <style>
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(4); }
            to { opacity: 1; transform: scale(1); }
        }

        .fade-in-scale {
            animation: fadeInScale 0.6s ease;
        }
    </style>
</span>

{%if online_count %}
<div id="online-icon" class="green-dot absolute top-4 left-4 ring-2 ring-slate-900"></div>
{% else %}
<div id="online-icon" class="gray-dot absolute top-4 left-4 ring-2 ring-slate-900"></div>
{% endif %}

<ul id="groupchat-members" hx-swap-oob="outerHTML" class="flex gap-3 overflow-x-auto px-2">
    {% for member in chat_group.members.all %}
    <li>
        <a href="{% url 'profile' member.username %}" class="flex flex-col text-slate-300 items-center justify-center w-20 gap-2 rounded-2xl p-2 hover:bg-white/5 transition-colors">
            <div class="relative">
                {% if member in chat_group.users_online.all %}
                <div class="green-dot border-2 border-slate-900 absolute bottom-0 right-0"></div>
                {% else %}
                <div class="gray-dot border-2 border-slate-900 absolute bottom-0 right-0"></div>
                {% endif %}
                <img src="{{ member.avatar }}" class="w-14 h-14 rounded-full object-cover ring-2 ring-white/15" />
            </div>
            <span class="text-xs font-semibold truncate w-full text-center">{{ member.name|slice:":10" }}</span>
        </a>
    </li>
    {% endfor %}
</ul>
