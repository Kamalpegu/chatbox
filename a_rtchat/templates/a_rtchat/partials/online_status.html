<div id="online-user-count" hx-swap-oob="outerHTML">
    {% if online_users %}
    <span class="inline-flex items-center rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-black text-emerald-200 ring-1 ring-emerald-400/30">
        <span class="mr-1.5 h-2 w-2 rounded-full bg-emerald-400"></span>
        {{ online_users.count }} online
    </span>
    {% else %}
    <span class="inline-flex items-center rounded-full bg-slate-700/70 px-3 py-1 text-xs font-black text-slate-300 ring-1 ring-white/10">
        <span class="mr-1.5 h-2 w-2 rounded-full bg-slate-400"></span>
        0 online
    </span>
    {% endif %}
</div>

<div id="online-in-chats" hx-swap-oob="outerHTML">
    {% if online_in_chats %}
    <div class="green-dot absolute top-2 right-2 z-20 ring-2 ring-slate-950"></div>
    {% endif %}
</div>
