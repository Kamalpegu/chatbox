{% if message.author == user %}
<li class="flex justify-end mb-4 animate-in">
    <div class="flex items-end justify-end gap-2 max-w-[85%]">
        <div class="bg-gradient-to-br from-emerald-400 to-emerald-500 text-emerald-950 rounded-3xl rounded-br-sm p-4 shadow-lg shadow-emerald-950/15 ring-1 ring-emerald-300/60">
            {% include 'a_rtchat/partials/message_content.html' %}
        </div>
        <div class="flex items-end pb-1">
            <svg height="14" width="10" class="drop-shadow-sm">
                <path fill="#34d399" d="M7.8,12.8C2.7,10.9,1.9,6.7,0.8,0.2L0.8,14l6.2,0C8.8,14,11.2,12.2,7.8,12.8z"/>
            </svg>
        </div>
    </div>
</li>
{% else %}
<li class="mb-4">
    <div class="flex justify-start items-end gap-3 max-w-[85%]">
        <a href="{% url 'profile' message.author.username %}" class="shrink-0">
            <img class="w-10 h-10 rounded-full object-cover ring-2 ring-white shadow-md" src="{{ message.author.avatar }}">
        </a>
        <div class="flex flex-col gap-1 min-w-0">
            <div class="bg-white rounded-3xl rounded-bl-sm p-4 shadow-lg shadow-slate-950/10 ring-1 ring-slate-200">
                {% include 'a_rtchat/partials/message_content.html' %}
            </div>
            <div class="text-xs font-bold px-2">
                <span class="text-white">{{ message.author.name }}</span> 
                <span class="text-slate-400">@{{ message.author.username }}</span>
            </div>
        </div>
    </div>
</li>
{% endif %}
